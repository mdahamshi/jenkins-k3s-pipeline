apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-k3s-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-k3s-app
  template:
    metadata:
      labels:
        app: jenkins-k3s-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/mdahamshi/jenkins-k3s-pipeline:latest
          ports:
            - containerPort: 3000
          imagePullPolicy: Always